<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beynimin Haritası</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    font-family: 'Segoe UI', 'Arial', sans-serif;
    overflow: hidden;
    position: relative;
    background: #0a0f1a;
  }

  /* Star dust particles */
  .stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  canvas {
    display: block;
    position: fixed;
    top: 0; left: 0;
    z-index: 1;
    pointer-events: none;
  }

  #bg-fade {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
    transition: opacity 4.5s cubic-bezier(0.15, 0.75, 0.2, 0.95);
    opacity: 1;
  }

  #mindmap-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    z-index: 2;
    overflow: hidden;
  }

  svg#mindmap {
    width: 100%;
    height: 100%;
    cursor: grab;
    transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  svg#mindmap:active {
    cursor: grabbing;
  }

  .zoomable-node {
    cursor: pointer;
  }

  .zoomable-node:hover {
    opacity: 0.8;
    filter: brightness(1.2) !important;
  }

  /* Node circles */
  .node-central {
    fill: #1a8fe3;
    stroke: #4db3f0;
    stroke-width: 5.5;
    stroke-opacity: 0.6;
    filter: drop-shadow(0 0 20px rgba(26,143,227,0.8));
  }

  .node-green { fill: #1db888; stroke: #4dd9a8; stroke-width: 5.5; stroke-opacity: 0.6; filter: drop-shadow(0 0 14px rgba(29,184,136,0.7)); }
  .node-purple { fill: #7c4dff; stroke: #a880ff; stroke-width: 5.5; stroke-opacity: 0.6; filter: drop-shadow(0 0 14px rgba(124,77,255,0.7)); }
  .node-yellow { fill: #f5a623; stroke: #f9c76b; stroke-width: 5.5; stroke-opacity: 0.6; filter: drop-shadow(0 0 14px rgba(245,166,35,0.7)); }
  .node-red { fill: #e84393; stroke: #f07ab8; stroke-width: 5.5; stroke-opacity: 0.6; filter: drop-shadow(0 0 14px rgba(232,67,147,0.7)); }
  .node-teal { fill: #00bcd4; stroke: #4dd9e8; stroke-width: 5.5; stroke-opacity: 0.6; filter: drop-shadow(0 0 14px rgba(0,188,212,0.7)); }
  .node-orange { fill: #ff6d3a; stroke: #ff9566; stroke-width: 5.5; stroke-opacity: 0.6; filter: drop-shadow(0 0 14px rgba(255,109,58,0.7)); }

  /* Child nodes */
  .child-green { fill: #17a377; stroke: #3dc99a; stroke-width: 4; stroke-opacity: 0.6; filter: drop-shadow(0 0 10px rgba(29,184,136,0.6)); }
  .child-purple { fill: #6a3de8; stroke: #9566ff; stroke-width: 4; stroke-opacity: 0.6; filter: drop-shadow(0 0 10px rgba(124,77,255,0.6)); }
  .child-yellow { fill: #d4900f; stroke: #e8b84d; stroke-width: 4; stroke-opacity: 0.6; filter: drop-shadow(0 0 10px rgba(245,166,35,0.6)); }
  .child-red { fill: #cc2a7e; stroke: #e85ba3; stroke-width: 4; stroke-opacity: 0.6; filter: drop-shadow(0 0 10px rgba(232,67,147,0.6)); }

  /* Hobiler - Crimson Red */
  .node-hobiler { fill: #cc0000; stroke: #ff6666; stroke-width: 5.5; stroke-opacity: 0.6; filter: drop-shadow(0 0 14px rgba(204,0,0,0.7)); }
  .child-hobiler { fill: #990000; stroke: #ff4444; stroke-width: 4; stroke-opacity: 0.6; filter: drop-shadow(0 0 10px rgba(204,0,0,0.6)); }
  .child-teal { fill: #009ab5; stroke: #3dc9e0; stroke-width: 4; stroke-opacity: 0.6; filter: drop-shadow(0 0 10px rgba(0,188,212,0.6)); }
  .child-orange { fill: #e85520; stroke: #f78a52; stroke-width: 4; stroke-opacity: 0.6; filter: drop-shadow(0 0 10px rgba(255,109,58,0.6)); }

  /* Text labels on nodes */
  .node-label {
    fill: #ffffff;
    font-weight: 700;
    text-anchor: middle;
    dominant-baseline: middle;
    pointer-events: none;
    letter-spacing: 0.5px;
  }

  .central-label { font-size: 16px; font-weight: 800; letter-spacing: 1px; }
  .main-label { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; }
  .child-label { font-size: 8.5px; font-weight: 600; }

  /* Connection lines */
  .connection {
    stroke-width: 1.2;
    fill: none;
    stroke-dasharray: 4,4;
    opacity: 0.5;
  }

  .conn-green  { stroke: #1db888; }
  .conn-purple { stroke: #7c4dff; }
  .conn-yellow { stroke: #f5a623; }
  .conn-red    { stroke: #e84393; }
  .conn-teal   { stroke: #00bcd4; }
  .conn-orange { stroke: #ff6d3a; }
  .conn-center { stroke: #4a9ede; stroke-dasharray: none; opacity: 0.3; stroke-width: 1; }

  /* Info boxes */
  .info-box {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }

  .info-box.active {
    opacity: 1;
    pointer-events: auto;
  }

  .info-box rect {
    rx: 6;
    ry: 6;
    stroke-width: 1;
    opacity: 0.95;
  }

  .info-text {
    fill: #c8d8f0;
    font-size: 7.5px;
    font-weight: 400;
  }

  .info-title {
    fill: #ffffff;
    font-size: 8px;
    font-weight: 600;
  }

  #info-panel {
    position: fixed;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 420px;
    max-height: 90vh;
    background: rgba(13, 27, 62, 0.95);
    border: 3px solid #1a8fe3;
    border-radius: 12px;
    padding: 32px;
    overflow-y: auto;
    z-index: 100;
    display: none;
    opacity: 0;
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    backdrop-filter: blur(10px);
  }

  #info-panel.visible {
    display: block;
    opacity: 1;
    right: 20px;
  }

  #info-panel h2 {
    color: #ffffff;
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 16px;
    letter-spacing: 0.5px;
  }

  #info-panel p {
    color: #c8d8f0;
    font-size: 16px;
    line-height: 1.7;
    margin-bottom: 12px;
  }

  #info-panel .close-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(255,255,255,0.2);
    border: none;
    color: #ffffff;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  #info-panel .close-btn:hover {
    background: rgba(255,255,255,0.3);
  }
</style>
</head>
<body>

<canvas id="starCanvas"></canvas>

<div id="bg-fade"></div>

<div id="info-panel">
  <button class="close-btn">✕</button>
  <div id="info-content"></div>

<div id="mindmap-container">

  <circle cx="960" cy="510" r="52" class="node-red" filter="url(#glow-soft)" data-info='{"title":"Kariyer","color":"#e84393","text":"Balıkesir Üniversitesi Bilgisayar Mühendisliği'nde eğitim. AI araçları ve modern teknolojilerle kariyer geliştirme."}'/>
  <text x="960" y="507" class="node-label main-label">KARİ-</text>
  <text x="960" y="519" class="node-label main-label">YER</text>

  <!-- Gaming (daha aşağı ve sola taşındı) -->
  <circle cx="340" cy="590" r="52" class="node-hobiler" filter="url(#glow-soft)" data-info='{"title":"Gaming","color":"#cc0000","text":"Video oyunları oynamak. Strateji, RPG ve kooperatif oyunlar. Eğlenme ve stres atmanın yolu."}'/>
  <text x="340" y="593" class="node-label main-label">GAMING</text>

  <!-- Hobiler (Gaming'in yerinde) -->
  <circle cx="810" cy="660" r="52" class="node-orange" filter="url(#glow-soft)" data-info='{"title":"Tutkular","color":"#ff6d3a","text":"Elektronik, yazılım ve teknoloji ile ilgili DIY projeler. Yaratıcılık ve öğrenme tutkusu."}'/>
  <text x="810" y="657" class="node-label main-label">HOBİ-</text>
  <text x="810" y="669" class="node-label main-label">LER</text>

  <!-- ═══════════════════ CENTRAL NODE ═══════════════════ -->
  <circle cx="700" cy="450" r="78" class="node-central" filter="url(#glow-blue)" data-info='{"title":"Beynimin Haritası","color":"#1a8fe3","text":"Kişisel gelişim haritası. Eğitim, kariyer, ilgi alanları, beceriler, projeler ve tutkularından oluşan bütünsel yaşam görüşü."}'/>
  <text x="700" y="443" class="node-label central-label">BEYNİMİN</text>
  <text x="700" y="458" class="node-label central-label">HARİTASI</text>

</svg>
</div>

<script>
// Random background gradient generator
const backgroundThemes = [
  { color1: '#0d1b3e', color2: '#060d1f', color3: '#020710', pos: '30% 40%' },
  { color1: '#1a0033', color2: '#0d001a', color3: '#050008', pos: '50% 30%' },
  { color1: '#001a4d', color2: '#000d2b', color3: '#000510', pos: '40% 60%' },
  { color1: '#2d0a3a', color2: '#1a0520', color3: '#0a0210', pos: '60% 40%' },
  { color1: '#0a1a2e', color2: '#050d1a', color3: '#020608', pos: '25% 50%' },
  { color1: '#1a0d2e', color2: '#0d0618', color3: '#050208', pos: '70% 35%' },
  { color1: '#0d2b3a', color2: '#051620', color3: '#020810', pos: '45% 55%' },
  { color1: '#2b1a3d', color2: '#160a22', color3: '#0a0310', pos: '35% 45%' },
  { color1: '#0d1a3a', color2: '#060d22', color3: '#020410', pos: '55% 40%' },
];

const bgFade = document.getElementById('bg-fade');

function setRandomBackgroundWithFade() {
  const theme = backgroundThemes[Math.floor(Math.random() * backgroundThemes.length)];
  const newBackground = `radial-gradient(ellipse at ${theme.pos}, ${theme.color1} 0%, ${theme.color2} 60%, ${theme.color3} 100%)`;

  // Fade out
  bgFade.style.opacity = '0.3';

  // Change background midway through fade
  setTimeout(() => {
    bgFade.style.background = newBackground;
    bgFade.style.opacity = '1';
  }, 4500);
}

setRandomBackgroundWithFade();

// Change background every 12 seconds with fade effect
setInterval(setRandomBackgroundWithFade, 12000);

// Star dust background
const canvas = document.getElementById('starCanvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const stars = Array.from({length: 180}, () => ({
  x: Math.random() * window.innerWidth,
  y: Math.random() * window.innerHeight,
  r: Math.random() * 1.2 + 0.2,
  a: Math.random() * 0.6 + 0.1,
  speed: Math.random() * 0.003 + 0.001,
  offset: Math.random() * Math.PI * 2
}));

let frame = 0;
function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  frame += 0.01;
  stars.forEach(s => {
    const alpha = s.a * (0.4 + 0.6 * Math.sin(frame * s.speed * 100 + s.offset));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,220,255,${alpha})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();

// Subtle node pulse animation via JS
const mainNodes = document.querySelectorAll('.node-central, .node-green, .node-purple, .node-yellow, .node-red, .node-teal, .node-orange');
mainNodes.forEach((node, i) => {
  let t = i * 0.8;
  function pulse() {
    t += 0.025;
    const scale = 1 + 0.015 * Math.sin(t);
    const cx = node.getAttribute('cx');
    const cy = node.getAttribute('cy');
    node.setAttribute('transform', `translate(${cx},${cy}) scale(${scale}) translate(${-cx},${-cy})`);
    requestAnimationFrame(pulse);
  }
  pulse();
});

// Adjust circle radius for inward stroke and add inner line
const allCircles = document.querySelectorAll('circle');

allCircles.forEach(circle => {
  const r = parseFloat(circle.getAttribute('r'));
  const cx = parseFloat(circle.getAttribute('cx'));
  const cy = parseFloat(circle.getAttribute('cy'));
  const computedStyle = window.getComputedStyle(circle);
  const strokeWidth = parseFloat(computedStyle.strokeWidth) || 0;
  const circleClass = circle.getAttribute('class');

  // Adjust outer circle radius
  circle.setAttribute('r', r - (strokeWidth / 2));

  // Create inner line circle
  const innerCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  innerCircle.setAttribute('cx', cx);
  innerCircle.setAttribute('cy', cy);
  innerCircle.setAttribute('r', r - (strokeWidth / 2) - 8);
  innerCircle.setAttribute('stroke-width', '0');
  innerCircle.setAttribute('pointer-events', 'none');

  // Get very dark color based on original circle class
  const colorMap = {
    'node-central': '#051f2e',
    'node-green': '#082140',
    'node-purple': '#2a0f5f',
    'node-yellow': '#6b4507',
    'node-red': '#5a1535',
    'node-teal': '#003a48',
    'node-orange': '#6b2410',
    'child-green': '#061a30',
    'child-purple': '#260a7f',
    'child-yellow': '#5a3a08',
    'child-red': '#4a0f35',
    'child-teal': '#002835',
    'child-orange': '#5a1a0f'
  };

  // Match class and apply very dark color
  for (const [className, darkColor] of Object.entries(colorMap)) {
    if (circleClass.includes(className)) {
      innerCircle.setAttribute('fill', darkColor);
      break;
    }
  }

  circle.parentNode.insertBefore(innerCircle, circle);
});

// Zoom functionality
const svg = document.getElementById('mindmap');
const infoPanel = document.getElementById('info-panel');
const infoContent = document.getElementById('info-content');
const closeBtn = document.querySelector('.close-btn');
let isZoomed = false;
let originalViewBox = '0 0 1400 900';

function closeInfoPanel() {
  infoPanel.classList.remove('visible');
  infoContent.innerHTML = '';
}

const darkColorMap = {
  '#1a8fe3': '#0d5c7f',
  '#1db888': '#0f8860',
  '#7c4dff': '#5a2dbf',
  '#f5a623': '#c48a1f',
  '#e84393': '#b0315f',
  '#00bcd4': '#007889',
  '#ff6d3a': '#d94a28',
  '#cc0000': '#990000'
};

function showInfoPanel(data) {
  infoContent.innerHTML = `
    <h2 style="color: ${data.color};">${data.title}</h2>
    <p>${data.text}</p>
  `;
  const borderColor = darkColorMap[data.color.toLowerCase()] || data.color;
  infoPanel.style.borderColor = borderColor;
  infoPanel.classList.add('visible');
}

allCircles.forEach(circle => {
  // Skip innerCircles (they don't have data-info)
  if (!circle.getAttribute('data-info')) return;

  circle.classList.add('zoomable-node');
  circle.addEventListener('click', (e) => {
    e.stopPropagation();
    const cx = parseFloat(circle.getAttribute('cx'));
    const cy = parseFloat(circle.getAttribute('cy'));
    const infoData = circle.getAttribute('data-info');

    if (isZoomed) {
      svg.setAttribute('viewBox', originalViewBox);
      closeInfoPanel();
      isZoomed = false;
    } else {
      const zoomLevel = 3;
      const viewBoxWidth = 1400 / zoomLevel;
      const viewBoxHeight = 900 / zoomLevel;
      // Hafif sola kaydır
      const x = cx - viewBoxWidth / 2.2;
      const y = cy - viewBoxHeight / 2;

      svg.setAttribute('viewBox', `${x} ${y} ${viewBoxWidth} ${viewBoxHeight}`);
      isZoomed = true;

      // Info panel göster (sadece data-info varsa)
      if (infoData) {
        try {
          const data = JSON.parse(infoData);
          showInfoPanel(data);
        } catch (e) {
          console.error('Info data parse error:', e);
        }
      } else {
        closeInfoPanel();
      }
    }
  });
});

closeBtn.addEventListener('click', () => {
  if (isZoomed) {
    svg.setAttribute('viewBox', originalViewBox);
    closeInfoPanel();
    isZoomed = false;
  }
});

// Double-click to zoom out
svg.addEventListener('dblclick', () => {
  if (isZoomed) {
    svg.setAttribute('viewBox', originalViewBox);
    closeInfoPanel();
    isZoomed = false;
  }
});
</script>

</body>
</html>
